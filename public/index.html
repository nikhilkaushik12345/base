<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login with Base</title>

<script>

let savedAccessToken = null;

function getAuthorizationCodeFromUrl() {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get('code');
}

function getStateFromUrl() {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get('state');
}

/**
 * PKCE helpers
 */
function base64UrlEncode(arrayBuffer) {
  return btoa(String.fromCharCode(...new Uint8Array(arrayBuffer)))
    .replace(/\+/g, '-')
    .replace(/\//g, '_')
    .replace(/=+$/, '');
}

function generateRandomString(length = 64) {
  const array = new Uint8Array(length);
  crypto.getRandomValues(array);
  return base64UrlEncode(array);
}

async function sha256(verifier) {
  const encoder = new TextEncoder();
  const data = encoder.encode(verifier);
  const digest = await crypto.subtle.digest("SHA-256", data);
  return base64UrlEncode(digest);
}

/**
 * Login with Base (OAuth + PKCE + state)
 */
async function loginWithBase() {
  const code_verifier = generateRandomString(64);
  const code_challenge = await sha256(code_verifier);
  const state = generateRandomString(16);

  sessionStorage.setItem("pkce_verifier", code_verifier);
  sessionStorage.setItem("oauth_state", state);

  const authUrl =
    "https://mcp.base.org/authorize" +
    "?response_type=code" +
    "&client_id=0b5c8965-b8b6-4259-a7b9-fc439b86dca2" +
    "&redirect_uri=" + encodeURIComponent("https://base-t56v.onrender.com/callback") +
    "&scope=" + encodeURIComponent("agent_wallet:transact agent_wallet:escalate") +
    "&state=" + encodeURIComponent(state) +
    "&code_challenge=" + encodeURIComponent(code_challenge) +
    "&code_challenge_method=S256";

  window.location.href = authUrl;
}

async function getAccessToken(code) {
  try {
    const code_verifier = sessionStorage.getItem("pkce_verifier");

    const res = await fetch("/exchange", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        code,
        code_verifier
      })
    });

    const data = await res.json();

    if (data.access_token) {
      savedAccessToken = data.access_token;

      document.getElementById("access-token").textContent =
        "Access Token: " + data.access_token;

      document.getElementById("send-request-btn").disabled = false;
    }

    document.getElementById("authorization-code").textContent =
      "Access Token Processed";

    document.getElementById("user-info").textContent =
      JSON.stringify(data.result ?? data, null, 2);

  } catch (err) {
    document.getElementById("authorization-code").textContent =
      "Error: " + err;
  }
}

async function sendMcpRequest() {
  if (!savedAccessToken) return;

  try {
    const res = await fetch("/mcp-request", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ access_token: savedAccessToken })
    });

    const data = await res.json();

    document.getElementById("mcp-response").textContent =
      JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("mcp-response").textContent =
      "Error: " + err;
  }
}

window.onload = () => {
  const code = getAuthorizationCodeFromUrl();
  const state = getStateFromUrl();
  const savedState = sessionStorage.getItem("oauth_state");

  if (!code) {
    loginWithBase();
    return;
  }

  // optional state validation
  if (state && savedState && state !== savedState) {
    document.getElementById("authorization-code").textContent =
      "Invalid state parameter";
    return;
  }

  document.getElementById("authorization-code").textContent =
    "Authorization Code: " + code;

  getAccessToken(code);
};

</script>
</head>

<body>
<h1>Login with Base</h1>

<button onclick="loginWithBase()">Login</button>

<p id="authorization-code"></p>
<p id="access-token" style="word-break: break-all;"></p>

<h2>User Information</h2>
<pre id="user-info"></pre>

<h2>Send MCP Request</h2>
<button id="send-request-btn" onclick="sendMcpRequest()" disabled>
  Send Request
</button>

<pre id="mcp-response"></pre>

</body>
</html>
