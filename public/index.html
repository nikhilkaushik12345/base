<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login with Base</title>

<script>

let savedAccessToken = null;

function getAuthorizationCodeFromUrl() {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get('code');
}

function getStateFromUrl() {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get('state');
}

/**
 * YOUR STATIC PKCE CREDENTIALS
 */
const CODE_VERIFIER = "lacCN6M3-maMDu5eKbt6mAI3dqBVlQYe6oxGRciF_0U";
const CODE_CHALLENGE = "zKMfGd0F7A1BNUTgELwy5bnDMPKVu4aYwBRK4_6RqX4";
const STATIC_STATE = "static_state_123";

function loginWithBase() {
  sessionStorage.setItem("oauth_state", STATIC_STATE);

  const authUrl =
    "https://mcp.base.org/authorize" +
    "?response_type=code" +
    "&client_id=0b5c8965-b8b6-4259-a7b9-fc439b86dca2" +
    "&redirect_uri=" + encodeURIComponent("https://base-t56v.onrender.com/callback") +
    "&scope=" + encodeURIComponent("agent_wallet:transact agent_wallet:escalate") +
    "&state=" + encodeURIComponent(STATIC_STATE) +
    "&code_challenge=" + CODE_CHALLENGE +
    "&code_challenge_method=S256";

  window.location.href = authUrl;
}

async function getAccessToken(code) {
  try {

    const res = await fetch("/exchange", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        code,
        code_verifier: CODE_VERIFIER
      })
    });

    const data = await res.json();

if (data.access_token) {
  savedAccessToken = data.access_token;

  document.getElementById("access-token").textContent =
    "Access Token: " + data.access_token;

  const btn = document.getElementById("send-request-btn");
  btn.disabled = false;

  // Automatically click the button
  btn.click();
}

    document.getElementById("authorization-code").textContent =
      "Access Token Processed";

    document.getElementById("user-info").textContent =
      JSON.stringify(data.result ?? data, null, 2);

  } catch (err) {
    document.getElementById("authorization-code").textContent =
      "Error: " + err;
  }
}

async function sendMcpRequest() {
  if (!savedAccessToken) return;

  try {
    const res = await fetch("/mcp-request", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ access_token: savedAccessToken })
    });

    const data = await res.json();

    document.getElementById("mcp-response").textContent =
      JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("mcp-response").textContent =
      "Error: " + err;
  }
}

window.onload = () => {
  const code = getAuthorizationCodeFromUrl();
  const state = getStateFromUrl();
  const savedState = sessionStorage.getItem("oauth_state");

  if (!code) {
    loginWithBase();
    return;
  }

  if (state && savedState && state !== savedState) {
    document.getElementById("authorization-code").textContent =
      "Invalid state parameter";
    return;
  }

  document.getElementById("authorization-code").textContent =
    "Authorization Code: " + code;

  getAccessToken(code);
};

</script>
</head>

<body>
<h1>Login with Base</h1>

<button onclick="loginWithBase()">Login</button>

<p id="authorization-code"></p>
<p id="access-token" style="word-break: break-all;"></p>

<h2>User Information</h2>
<pre id="user-info"></pre>

<h2>Send MCP Request</h2>
<button id="send-request-btn" onclick="sendMcpRequest()" disabled>
  Send Request
</button>

<pre id="mcp-response"></pre>

</body>
</html>
